workflows:
  default-workflow:
    name: Build APK from ZIP
    environment:
      flutter: stable
    scripts:
      - name: Unzip project
        script: |
          apt-get update
          apt-get install -y unzip
          unzip -o *.zip -d .
          rm -f *.zip
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
